name: Linux helper

on:
  pull_request:
    paths:
      - "Sources/AwesoMuxBridgeProtocol/**"
      - "Sources/AwesoMuxBridgeHelperSupport/**"
      - "Sources/awesoMuxBridgeHelper/**"
      - "Sources/UnicodeHygiene/**"
      - "Tests/AwesoMuxBridgeProtocolTests/**"
      - "Tests/AwesoMuxBridgeHelperSupportTests/**"
      - "Tests/AwesoMuxTestSupport/**"
      - "Tests/UnicodeHygieneTests/**"
      - "Package.swift"
      - ".swift-version"
      - "script/build_linux_helper.sh"
      - "script/ci/linux_handoff_smoke.sh"
      - ".github/workflows/linux-helper.yml"
  push:
    branches: ["main"]
    paths:
      - "Sources/AwesoMuxBridgeProtocol/**"
      - "Sources/AwesoMuxBridgeHelperSupport/**"
      - "Sources/awesoMuxBridgeHelper/**"
      - "Sources/UnicodeHygiene/**"
      - "Tests/AwesoMuxBridgeProtocolTests/**"
      - "Tests/AwesoMuxBridgeHelperSupportTests/**"
      - "Tests/AwesoMuxTestSupport/**"
      - "Tests/UnicodeHygieneTests/**"
      - "Package.swift"
      - ".swift-version"
      - "script/build_linux_helper.sh"
      - "script/ci/linux_handoff_smoke.sh"
      - ".github/workflows/linux-helper.yml"

permissions:
  contents: read

jobs:
  linux-tests:
    name: Linux unit tests
    runs-on: ubuntu-24.04
    # swift:6.3.3-noble matches the pinned toolchain in .swift-version and
    # verified present on Docker Hub (2026-07-22).
    container: swift:6.3.3-noble
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run portable test targets
        run: swift test

  build:
    name: Cross-compile static helpers
    runs-on: ubuntu-24.04
    container: swift:6.3.3-noble
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build both architectures
        # Re-downloads the Static Linux SDK every run (a few hundred MB,
        # accepted cost). Switch to actions/cache if this starts hurting.
        run: ./script/build_linux_helper.sh
      - name: Run unit suite against the Musl overlay
        # x86_64 static binaries run natively on this runner, so the full
        # receiver suite (incl. the publish-collision test) executes against
        # the SAME libc the shipped helper links — Glibc coverage alone
        # would miss Musl overlay divergence.
        run: swift test --swift-sdk x86_64-swift-linux-musl
      - name: Upload helper artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-helper
          path: dist/linux-helper/
          if-no-files-found: error

  smoke:
    name: SSH end-to-end smoke
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download helper artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-helper
          path: dist/linux-helper/
      - name: Run smoke against dockerized sshd
        run: |
          chmod +x dist/linux-helper/awesomux-bridge-helper-linux-x86_64
          ./script/ci/linux_handoff_smoke.sh dist/linux-helper/awesomux-bridge-helper-linux-x86_64
