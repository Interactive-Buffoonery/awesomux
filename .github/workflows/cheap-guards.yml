name: Cheap guards

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review-automation-and-plurals:
    name: Review automation and plurals
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Review-automation unit tests
        run: ./script/test-review-automation.sh

      - name: Public-seed source policy
        run: ./script/check_public_seed_source.sh

      - name: Plural localization guards
        run: ./script/check_plural_guards.sh

      - name: Formatter guardrail tests
        run: ./script/test-format.sh

      - name: Swift format lint
        env:
          FORMAT_LINT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: ./script/format.sh --lint
