name: Native CI execution-ref cleanup

on:
  workflow_run:
    workflows: [Native CI executor]
    types: [completed]

permissions: {}

jobs:
  cleanup:
    name: Delete native execution ref
    if: startsWith(github.event.workflow_run.head_branch, 'native-ci-runs/run-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete execution ref
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EXECUTION_REF: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if [[ ! "$EXECUTION_REF" =~ ^native-ci-runs/run-[0-9]+-[0-9]+$ ]]; then
            echo "ref does not match the native execution namespace" >&2
            exit 1
          fi
          gh api --method DELETE \
            "repos/${GITHUB_REPOSITORY}/git/refs/heads/${EXECUTION_REF}" >/dev/null
