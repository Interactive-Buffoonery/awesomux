name: CodeRunner planning

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: namemeplz-tests-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  plan-and-dispatch:
    if: >-
      vars.CODERUNNER_ENABLED == 'true' &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.base.repo.full_name == github.repository &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(fromJSON('["serabi", "edequalsawesome"]'), github.event.pull_request.user.login) &&
      (
        contains(fromJSON('["opened", "reopened", "synchronize", "ready_for_review"]'), github.event.action) ||
        (
          github.event.action == 'labeled' &&
          github.event.label.name == 'CodeRunner' &&
          contains(fromJSON('["serabi", "edequalsawesome"]'), github.actor)
        )
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Validate the trusted PR event
        id: event
        env:
          SOURCE_LABEL: ${{ github.event.label.name || '' }}
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = 1
          jq -e \
            --arg actor "$GITHUB_ACTOR" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg label "$SOURCE_LABEL" \
            '
              .repository.full_name == $repository and
              .pull_request.state == "open" and
              .pull_request.draft == false and
              .pull_request.base.ref == "main" and
              .pull_request.base.repo.full_name == $repository and
              .pull_request.head.repo.full_name == $repository and
              (.pull_request.user.login == "serabi" or
                .pull_request.user.login == "edequalsawesome") and
              (
                (.action == "opened" or .action == "reopened" or
                  .action == "synchronize" or .action == "ready_for_review") or
                (
                  .action == "labeled" and
                  .sender.login == $actor and
                  ($actor == "serabi" or $actor == "edequalsawesome") and
                  $label == "CodeRunner" and
                  any(.pull_request.labels[]; .name == $label)
                )
              )
            ' "$GITHUB_EVENT_PATH" >/dev/null
          trigger_actor="$(jq -r '
            if .action == "labeled" then .sender.login else .pull_request.user.login end
          ' "$GITHUB_EVENT_PATH")"
          printf 'trigger_actor=%s\n' "$trigger_actor" >> "$GITHUB_OUTPUT"

      - name: Check out the trusted planner
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.workflow_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Fetch immutable PR metadata and select tests
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" \
            --jq '[.[] | {filename, additions, deletions}]' \
            | jq -s 'add' > "$RUNNER_TEMP/files.json"
          node .github/scripts/namemeplz-test-plan.mjs \
            "$RUNNER_TEMP/files.json" > "$RUNNER_TEMP/plan.json"
          jq -e \
            --arg sha "$HEAD_SHA" \
            '.schemaVersion == 2 and (.automaticChecks | length > 0) and ($sha | length == 40)' \
            "$RUNNER_TEMP/plan.json" >/dev/null
          capabilities="$(jq -c '.automaticChecks' "$RUNNER_TEMP/plan.json")"
          local_commands="$(jq -c '.localCommands' "$RUNNER_TEMP/plan.json")"
          estimate="$(jq -r '.estimatedMinutes' "$RUNNER_TEMP/plan.json")"
          {
            printf 'capabilities=%s\n' "$capabilities"
            printf 'local_commands=%s\n' "$local_commands"
            printf 'estimated_minutes=%s\n' "$estimate"
          } >> "$GITHUB_OUTPUT"

      - name: Publish the immutable test plan
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ESTIMATED_MINUTES: ${{ steps.plan.outputs.estimated_minutes }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          marker="<!-- runnertests-plan:$HEAD_SHA -->"
          {
            printf '%s\n' "$marker"
            printf '## CodeRunner plan\n\n'
            # shellcheck disable=SC2016
            printf 'Testing `%s` on the disposable iMac runner.\n\n' "$HEAD_SHA"
            printf '**Selected checks**\n\n'
            # shellcheck disable=SC2016
            jq -r '.automaticChecks[] | "- `" + . + "`"' "$RUNNER_TEMP/plan.json"
            if test "$(jq '.localCommands | length' "$RUNNER_TEMP/plan.json")" -gt 0; then
              printf '\n**Required maintainer-local validation**\n\n'
              # shellcheck disable=SC2016
              jq -r '.localCommands[] | "- [ ] `" + . + "`"' "$RUNNER_TEMP/plan.json"
              printf '\nSarah or Ed must run these commands before enabling auto-merge. CodeRunner does not claim they passed.\n'
            fi
            printf '\n**Why these checks**\n\n'
            # shellcheck disable=SC2016
            jq -r '.reasons[] | "- " + .' "$RUNNER_TEMP/plan.json"
            printf '\n**Estimated time:** about %s minutes. This estimate will improve from observed runs.\n\n' "$ESTIMATED_MINUTES"
            printf '> Want GitHub to merge after every required check passes? Use the native **Enable auto-merge** control on this PR. CodeRunner never merges or requests changes itself.\n'
          } > "$RUNNER_TEMP/comment.md"
          existing_id="$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" \
            | head -n 1)"
          if test -n "$existing_id"; then
            gh api --method PATCH \
              "repos/$GITHUB_REPOSITORY/issues/comments/$existing_id" \
              -F body=@"$RUNNER_TEMP/comment.md" >/dev/null
          else
            gh api --method POST \
              "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              -F body=@"$RUNNER_TEMP/comment.md" >/dev/null
          fi
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state=pending \
            -f context='CodeRunner' \
            -f description="Selected checks are queued (~${ESTIMATED_MINUTES}m)" \
            -f target_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null

      - name: Mint the controller dispatcher token
        id: dispatcher
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.NAMEMEPLZ_DISPATCHER_CLIENT_ID }}
          private-key: ${{ secrets.NAMEMEPLZ_DISPATCHER_PRIVATE_KEY }}
          owner: Interactive-Buffoonery
          repositories: runner-control
          permission-actions: write

      - name: Dispatch the exact current head once
        env:
          DISPATCH_TOKEN: ${{ steps.dispatcher.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TEST_CAPABILITIES: ${{ steps.plan.outputs.capabilities }}
        run: |
          set -euo pipefail
          jq -n \
            --arg pr_number "$PR_NUMBER" \
            --arg head_sha "$HEAD_SHA" \
            --arg trigger_actor "${{ steps.event.outputs.trigger_actor }}" \
            --arg source_action "${{ github.event.action }}" \
            --arg source_run_id "$GITHUB_RUN_ID" \
            --arg source_run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg test_capabilities "$TEST_CAPABILITIES" \
            '{
              ref: "main",
              inputs: {
                source_repository: "Interactive-Buffoonery/awesomux",
                pull_request_number: $pr_number,
                commit_sha: $head_sha,
                test_capabilities: $test_capabilities,
                trigger_mode: "automatic",
                trigger_actor: $trigger_actor,
                source_action: $source_action,
                source_workflow_run_id: $source_run_id,
                source_workflow_run_attempt: $source_run_attempt
              }
            }' > "$RUNNER_TEMP/dispatch.json"
          curl \
            --proto '=https' \
            --tlsv1.2 \
            --fail-with-body \
            --silent \
            --show-error \
            --connect-timeout 5 \
            --max-time 20 \
            --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $DISPATCH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --data-binary "@$RUNNER_TEMP/dispatch.json" \
            'https://api.github.com/repos/Interactive-Buffoonery/runner-control/actions/workflows/awesomux-exact-sha-pilot.yml/dispatches'

      - name: Publish a fail-closed dispatch failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            -f state=failure \
            -f context='CodeRunner' \
            -f description='CodeRunner could not start the selected checks' \
            -f target_url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null
          {
            printf '%s\n\n%s\n' \
              "<!-- runnertests-result:$HEAD_SHA -->" \
              "## CodeRunner could not start tests"
            # shellcheck disable=SC2016
            printf 'The trusted planner or controller dispatch failed for `%s`. ' "$HEAD_SHA"
            printf '[Open the source workflow run](https://github.com/%s/actions/runs/%s).\n\n' \
              "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf '> CodeRunner failed closed; no passing status or merge action was produced.\n'
          } > "$RUNNER_TEMP/failure-comment.md"
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            -F body=@"$RUNNER_TEMP/failure-comment.md" >/dev/null
