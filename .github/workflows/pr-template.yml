name: PR hygiene

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-template-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR metadata
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      MAINTAINER_LOGINS_JSON: ${{ vars.MAINTAINER_LOGINS_JSON || '[]' }}
    steps:
      - name: Check out trusted validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Read pull request metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" --jq '[.[].filename]' | jq -s 'add')"
          {
            echo "files=$(jq -c . <<< "$files")"
          } >> "$GITHUB_OUTPUT"

      - name: Validate description
        id: validator
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_FILES_JSON: ${{ steps.metadata.outputs.files }}
        run: node .github/scripts/validate-pr-body.mjs

      - name: Update validation comment
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VALID: ${{ steps.validator.outputs.valid }}
          MESSAGE: ${{ steps.validator.outputs.message }}
        run: |
          set -euo pipefail
          marker='<!-- awesomux-pr-template-validation -->'
          comment_id="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
              --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -1
          )"

          if [[ "$VALID" == "true" ]]; then
            if [[ -n "$comment_id" ]]; then
              gh api --method DELETE \
                "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" >/dev/null
            fi
          elif [[ -n "$comment_id" ]]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              -f body="$MESSAGE" >/dev/null
          else
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="$MESSAGE" >/dev/null
          fi

      - name: Sync external contributor checklist
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          marker='<!-- awesomux-external-pr-checklist -->'
          comment_id="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
              --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -1
          )"
          allowlisted="$(jq --arg login "$PR_AUTHOR" 'index($login) != null' <<< "$MAINTAINER_LOGINS_JSON")"

          if [[ "$allowlisted" == "true" ]]; then
            if [[ -n "$comment_id" ]]; then
              gh api --method DELETE \
                "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" >/dev/null
            fi
            exit 0
          fi

          body="$(printf '%s\n' \
            "$marker" \
            "## External contributor checklist" \
            "" \
            "Thanks for contributing. A maintainer will handle the trusted checks and final merge." \
            "" \
            "- [ ] A maintainer has reviewed the change." \
            "- [ ] The PR description follows the template and explains validation." \
            "- [ ] Visible changes include screenshots or a clear not-applicable explanation." \
            "- [ ] The contributor ran \`./script/swift-test.sh\` and \`./script/preflight.sh\`, or explained why not." \
            "- [ ] A maintainer confirmed no untrusted fork code was run with repository secrets.")"

          if [[ -n "$comment_id" ]]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              -f body="$body" >/dev/null
          else
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="$body" >/dev/null
          fi

      - name: Require a valid description
        if: steps.validator.outputs.valid != 'true'
        run: exit 1
