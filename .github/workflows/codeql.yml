name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  interpreted:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, python]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  complete:
    name: CodeQL interpreted complete
    if: always()
    needs: [interpreted]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify every analysis completed successfully
        env:
          INTERPRETED_RESULT: ${{ needs.interpreted.result }}
        run: |
          set -euo pipefail

          printf 'Interpreted analyses: %s\n' "$INTERPRETED_RESULT"

          if [[ "$INTERPRETED_RESULT" != "success" ]]; then
            echo "::error::one or more interpreted CodeQL analysis jobs did not succeed"
            exit 1
          fi
