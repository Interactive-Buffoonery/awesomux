name: Swift

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Run agent hook tests
        run: ./script/agent-hooks/test-awesomux-agent-event.sh

      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer

      - name: Install Zig
        run: |
          brew install zig@0.15
          echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"

      - name: Build and test amx (zmx fork)
        run: |
          (cd vendor/zmx && zig build test)
          ./script/build_amx.sh

      - name: Build Ghostty artifacts
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          ./script/build_ghostty_xcframework.sh

      - name: Build app
        run: swift build

      - name: Run tests
        run: swift test
