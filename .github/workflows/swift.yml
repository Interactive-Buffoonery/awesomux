name: Swift

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: blacksmith-6vcpu-macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Run agent hook tests
        run: ./script/agent-hooks/test-awesomux-agent-event.sh

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Install Zig
        run: |
          brew install zig@0.15
          echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"

      - name: Build and test amx (zmx fork)
        run: |
          (cd vendor/zmx && zig build test)
          ./script/build_amx.sh

      - name: Build Ghostty artifacts
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          ./script/build_ghostty_xcframework.sh

      - name: Build app
        run: swift build

      - name: Run tests
        run: swift test
