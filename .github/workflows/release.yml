name: Release

# Three triggers: pushing a v* tag cuts a draft release automatically (the
# normal path), workflow_dispatch remains for pipeline iteration and ad-hoc
# builds, and a daily cron publishes a rolling `nightly` prerelease. See
# docs/releasing.md.
#
# script/build_release.sh is the single source of signing/notarization
# behavior; this workflow only reconstructs the environment it needs
# (checkout, Zig, Xcode, cached Ghostty artifacts, a temp signing keychain)
# and calls it. No codesign/notarytool logic is inlined here.
#
# The nightly lane reuses the exact release job below — same environment,
# cache, keychain lifecycle, and fail-closed validation — and only differs in
# how the version is resolved, a pre-flight gate (nightly-gate), and how the
# artifact is published (a rolling prerelease instead of a per-version draft).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z, matches CFBundleShortVersionString)"
        required: true
        type: string
      create_draft_release:
        description: "Create a draft GitHub Release from this run (workflow artifacts are always produced either way)"
        required: false
        type: boolean
        default: false
  schedule:
    # Daily 09:00 UTC nightly. nightly-gate exits early when main is unchanged
    # since the last nightly or has not passed Cheap guards, so most nights this
    # cron is cheap.
    - cron: "0 9 * * *"

permissions:
  contents: write

concurrency:
  # Nightly runs get their own group so a cold-cache nightly (a full Ghostty
  # rebuild plus up to 45m notarization) can never queue-block or drop a real
  # tag/dispatch release — each run has its own $RUNNER_TEMP keychain, so there
  # is no signing-material reason to serialize the two channels together.
  group: ${{ github.event_name == 'schedule' && 'release-nightly' || 'release' }}
  # GitHub holds at most one PENDING run per concurrency group — a newer
  # dispatch replaces an older, still-queued one rather than lining up behind
  # it. cancel-in-progress: false only guarantees a RUNNING release is never
  # cancelled by a newer dispatch; it says nothing about queued runs.
  cancel-in-progress: false

jobs:
  nightly-gate:
    name: Decide whether tonight's nightly should build
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Decide
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Fail-safe: the ONLY path that flips should_build to true is an
          # affirmative "main changed since the last complete nightly AND this
          # exact commit passed Cheap guards". Every gh hiccup, missing run, or
          # non-success conclusion leaves it false — a transient blip just misses
          # one nightly and the next cron recovers. The gate never signs on
          # uncertainty. `|| true` on reads keeps a transient error from aborting
          # the step; the downstream checks then fail closed on the empty value.
          emit() { echo "should_build=$1" >> "$GITHUB_OUTPUT"; }

          # Skip-if-unchanged. Read the built commit from the `nightly` TAG REF,
          # never target_commitish (which reads back as the branch name once the
          # tag exists, so it can never equal a SHA and the guard would no-op).
          # A partially-published nightly — tag moved but the DMG asset never
          # uploaded — must NOT count as "already built", or the gate would skip
          # forever on a broken channel, so the asset presence is required too.
          # A missing tag (404, e.g. the first-ever nightly) reads as changed.
          REF_JSON="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/nightly" 2>/dev/null || true)"
          if [[ -n "$REF_JSON" ]]; then
            # A malformed response leaves these empty and the run falls through to
            # a rebuild rather than aborting the step — still green-gated below.
            OBJ_TYPE="$(jq -r '.object.type // ""' <<<"$REF_JSON" 2>/dev/null || echo "")"
            OBJ_SHA="$(jq -r '.object.sha // ""' <<<"$REF_JSON" 2>/dev/null || echo "")"
            if [[ "$OBJ_TYPE" == "tag" ]]; then
              # Annotated tag: deref to the commit it points at.
              OBJ_SHA="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$OBJ_SHA" --jq '.object.sha' 2>/dev/null || echo "")"
            fi
            HAS_ASSET="$(gh release view nightly --json assets \
              --jq '[.assets[].name] | index("awesoMux-nightly.dmg") != null' 2>/dev/null || echo "false")"
            if [[ -n "$OBJ_SHA" && "$OBJ_SHA" == "$HEAD_SHA" && "$HAS_ASSET" == "true" ]]; then
              echo "main unchanged since last complete nightly ($HEAD_SHA); skipping."
              emit false
              exit 0
            fi
          else
            echo "No prior nightly tag; treating main as changed."
          fi

          # Skip-if-main-red. Require the exact commit we would sign to have a
          # COMPLETED, SUCCESSFUL push-triggered Cheap guards run. Native CI does
          # not run on main pushes (issue_comment/dispatch only; canary not
          # enabled — docs/ci.md), so Cheap guards is the real per-main-push gate.
          # No completed run for this SHA (still running, or none) => not proven
          # green => skip and recover next cron.
          # jq --arg (not string interpolation) so the SHA can never be read as
          # jq program text — defense in depth; github.sha is always trusted hex.
          # Identify the workflow by its canonical file name, not its display
          # name, so this does not depend on gh's display-name matching.
          CONCLUSION="$(gh run list --workflow cheap-guards.yml --branch main --event push \
            --status completed --json headSha,conclusion -L 50 2>/dev/null \
            | jq -r --arg sha "$HEAD_SHA" '[.[] | select(.headSha == $sha)][0].conclusion // ""' 2>/dev/null \
            || echo "")"
          if [[ "$CONCLUSION" != "success" ]]; then
            echo "Cheap guards for $HEAD_SHA is '${CONCLUSION:-none}', not success; skipping."
            emit false
            exit 0
          fi

          echo "main changed and green at $HEAD_SHA; building nightly."
          emit true

  linux-helper:
    name: Cross-compile Linux helpers
    # Nightly ships the macOS DMG only; the Linux cross-compile is release/tag
    # scope, so skip it on the cron lane.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    # Job-level override of the workflow's contents: write — this job only
    # builds and uploads artifacts, it never touches repo contents.
    permissions:
      contents: read
    # swift:6.3.3-noble matches the pinned toolchain in .swift-version, same
    # image as .github/workflows/linux-helper.yml.
    container: swift:6.3.3-noble
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build both architectures
        run: ./script/build_linux_helper.sh
      - name: Upload helper artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-helper
          path: dist/linux-helper/
          if-no-files-found: error

  release:
    name: Build, sign, and notarize
    needs: [nightly-gate, linux-helper]
    # Status-check functions (!cancelled/!failure) disable GitHub's default
    # "skip me if a needed job was skipped" behavior, so the if fully governs:
    #   - tag/dispatch: nightly-gate is skipped (not a failure), linux-helper
    #     runs; event != schedule => release runs.
    #   - schedule + build: linux-helper is skipped (not a failure), gate says
    #     true => release runs.
    #   - schedule + skip: gate says false => release is skipped (green run, no
    #     wasted signed build).
    # !failure() still lets a real linux-helper failure block a tag/dispatch
    # release, since that job is required for those lanes' assets.
    if: ${{ !cancelled() && !failure() && (github.event_name != 'schedule' || needs.nightly-gate.outputs.should_build == 'true') }}
    # macos-26, not macos-15: the app icon is an Icon Composer .icon that
    # needs Xcode 26's actool, and Xcode 26 IB tooling crashes (dyld symbol
    # mismatches) on a macOS 15 host — run 29300046831. The OS must match the
    # Xcode generation the image ships.
    runs-on: macos-26
    # Nightly reuses the reviewer-gated `release` environment by default, so a
    # scheduled run waits for the same manual approval a real release does. To
    # run nightlies hands-off, set the repo variable NIGHTLY_ENVIRONMENT to a
    # dedicated environment that holds the same five secrets with a main-only
    # deployment rule and no required reviewers; then the cron self-approves.
    # A typo'd variable names a nonexistent environment, which GitHub
    # auto-creates empty — the "Verify required release secrets" step then fails
    # closed before any signing. This fail-closed guarantee holds only while the
    # five signing secrets stay scoped to the `release` environment (they are
    # today); if they were ever also defined at repo scope, secrets.* would
    # resolve them in the typo'd environment and sign without the reviewer gate.
    environment: ${{ github.event_name == 'schedule' && vars.NIGHTLY_ENVIRONMENT != '' && vars.NIGHTLY_ENVIRONMENT || 'release' }}
    # Cold Ghostty rebuild + up to 45m Apple notarization + margin. The 6h
    # GitHub Actions default would hide a hung run for hours before anyone
    # notices.
    timeout-minutes: 180
    env:
      # Job-level (not step-level) so it's both a real shell env var in every
      # run: step AND usable via ${{ env.AWESOMUX_GHOSTTY_OPTIMIZE }} in the
      # Ghostty cache key below — a sibling step's own env: block isn't
      # visible to ${{ }} expressions.
      AWESOMUX_GHOSTTY_OPTIMIZE: ReleaseFast
    steps:
      - name: Validate ref and resolve release version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Defense in depth on top of the environment's deployment protection
          # rules: assert the ref ourselves too. Dispatch and schedule runs come
          # from main; tag runs from v* refs only.
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
              echo "::error::schedule runs only accept refs/heads/main; got $GITHUB_REF" >&2
              exit 1
            fi
            # Nightly version: numeric X.Y.Z only (CFBundleShortVersionString
            # rejects prerelease suffixes). 0.0.<YYYYMMDD> is valid, datable, and
            # clearly a nightly; the monotonic ordering lives in CFBundleVersion
            # (git commit count, build_release.sh's default).
            RELEASE_VERSION="0.0.$(date -u +%Y%m%d)"
          elif [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
              echo "::error::tag runs only accept refs/tags/v*; got $GITHUB_REF" >&2
              exit 1
            fi
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          else
            if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
              echo "::error::dispatch runs only accept refs/heads/main; got $GITHUB_REF" >&2
              exit 1
            fi
            RELEASE_VERSION="$VERSION_INPUT"
          fi
          # Fail before touching secrets or spending Zig/Xcode setup time on a
          # malformed version — the v* pattern also matches tags like vbanana,
          # and script/build_release.sh enforces this grammar only after the
          # expensive setup below.
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release version must be X.Y.Z (three integers), got: $RELEASE_VERSION" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Verify required release secrets are present
        env:
          RELEASE_P12_BASE64: ${{ secrets.RELEASE_P12_BASE64 }}
          RELEASE_P12_PASSWORD: ${{ secrets.RELEASE_P12_PASSWORD }}
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          # GitHub silently auto-creates a referenced Environment if it
          # doesn't exist yet, and an undefined secret just reads as an empty
          # string instead of failing the run — without this check, a
          # typo'd secret name fails 20+ minutes in with a raw `security` or
          # `xcrun notarytool` error instead of a clear one up front.
          REQUIRED_SECRETS=(RELEASE_P12_BASE64 RELEASE_P12_PASSWORD NOTARY_KEY_P8 NOTARY_KEY_ID NOTARY_ISSUER_ID)
          MISSING=()
          for name in "${REQUIRED_SECRETS[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              MISSING+=("$name")
            fi
          done
          if [[ "${#MISSING[@]}" -gt 0 ]]; then
            echo "::error::missing or empty secrets in the 'release' environment: ${MISSING[*]}" >&2
            exit 1
          fi

      - name: Resolve release collisions for this version
        if: inputs.create_draft_release || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION"
          # Deliberately before the build, not just before publish: a
          # re-dispatch that only needed to learn about a stale draft
          # shouldn't have to burn a full signed build to find out at the
          # last step.
          #
          # The list endpoint (filtered by tag_name) is used deliberately:
          # draft releases have no tag ref until published, so the get-by-tag
          # endpoint (releases/tags/<tag>) is blind to exactly the stale-draft
          # case this check exists for. The list DOES include drafts for this
          # token.
          PUBLISHED="$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            | jq -r --arg tag "v$VERSION" '[.[] | select(.tag_name == $tag and (.draft | not))] | length')"
          if [[ "$PUBLISHED" -gt 0 ]]; then
            echo "::error::a PUBLISHED release for v$VERSION already exists — bump the version" >&2
            exit 1
          fi
          DRAFT_ID="$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            | jq -r --arg tag "v$VERSION" '[.[] | select(.tag_name == $tag and .draft)][0].id // empty')"
          if [[ -n "$DRAFT_ID" ]]; then
            if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
              # Tag re-runs are idempotent: replace the stale draft (drafts
              # hold no tag ref, so deletion is public-surface-free).
              echo "Replacing stale draft release $DRAFT_ID for v$VERSION (tag re-run)."
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$DRAFT_ID" >/dev/null
            else
              echo "::error::a draft release for v$VERSION already exists — delete it (gh release delete v$VERSION) or bump the version" >&2
              exit 1
            fi
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive
          # Never leave the job token in git config: every later step (including
          # the SwiftPM build that executes third-party package code) would
          # inherit write-capable credentials. The gh steps pass GH_TOKEN
          # explicitly instead.
          persist-credentials: false

      - name: Read Ghostty submodule pin and required Zig version
        id: ghostty-pin
        run: |
          set -euo pipefail
          GHOSTTY_SHA="$(git rev-parse HEAD:vendor/ghostty)"
          # Submodule population failure would otherwise die as a raw sed
          # stderr message under pipefail — fail with a clear pointer instead.
          if [[ ! -f vendor/ghostty/build.zig.zon ]]; then
            echo "::error::vendor/ghostty/build.zig.zon not found — is the submodule populated? (git submodule update --init --recursive)" >&2
            exit 1
          fi
          # Mirrors read_ghostty_required_zig_version() in
          # script/build_ghostty_xcframework.sh — replicate the mechanism,
          # don't invent a second Zig version pin.
          ZIG_VERSION="$(sed -nE 's/.*\.minimum_zig_version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' vendor/ghostty/build.zig.zon | head -n 1)"
          if [[ -z "$ZIG_VERSION" ]]; then
            echo "::error::could not read minimum_zig_version from vendor/ghostty/build.zig.zon — check whether vendor/ghostty/build.zig.zon's format changed upstream (mirrors script/build_ghostty_xcframework.sh)" >&2
            exit 1
          fi
          if [[ ! "$ZIG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Zig pin '$ZIG_VERSION' is not a tagged release — ziglang.org's index only serves stable versions and 'master'; a dev-snapshot pin needs a workflow override (see script/build_ghostty_xcframework.sh's select_zig for the local equivalents)" >&2
            exit 1
          fi
          {
            echo "ghostty_sha=$GHOSTTY_SHA"
            echo "zig_version=$ZIG_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Install Zig (Homebrew, pinned 0.15 formula)
        env:
          # Homebrew's tap-trust gate aborts every brew command while any
          # untrusted tap is present, and GitHub's macOS images ship with
          # aws/tap preinstalled. Non-interactive CI can't answer the trust
          # prompt, so opt out (same as prepare-native).
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          set -euo pipefail
          # zig@0.15, not current zig: Ghostty requires same-minor 0.15 with
          # patch >= 2, and select_zig in script/build_ghostty_xcframework.sh
          # is the compatibility authority — it rejected brew's current 0.16
          # formula in run 29333040790 and its error names this exact formula.
          # (Homebrew, not the ziglang.org tarball: the upstream 0.15.2 binary
          # cannot link libc against current macOS SDKs — run 29300808015,
          # reproduced locally.)
          brew install zig@0.15
          ZIG_BIN="$(brew --prefix zig@0.15)/bin/zig"
          "$ZIG_BIN" version
          # AWESOMUX_ZIG is the build scripts' documented override; the keg-only
          # formula isn't on PATH, and the scripts' own select_zig validates
          # compatibility from here.
          echo "AWESOMUX_ZIG=$ZIG_BIN" >> "$GITHUB_ENV"

      - name: Select Xcode toolchain matching the package's Swift requirement
        id: xcode
        run: |
          set -euo pipefail
          # Pick the newest Xcode on the image, then ASSERT its Swift satisfies
          # Package.swift's declared tools version. A version-family glob
          # (e.g. Xcode_16*) encodes a stale assumption the day the Swift pin
          # moves — the first dispatch run failed exactly that way (Swift 6.3
          # package vs Xcode 16.4's Swift 6.1 toolchain).
          shopt -s nullglob
          CANDIDATES=(/Applications/Xcode_*.app)
          shopt -u nullglob
          if [[ ${#CANDIDATES[@]} -eq 0 ]]; then
            echo "::error::no Xcode app bundle found under /Applications" >&2
            ls /Applications >&2
            exit 1
          fi
          NEWEST="$(printf '%s\n' "${CANDIDATES[@]}" | sort -V | tail -n1)"
          DEVELOPER_DIR="$NEWEST/Contents/Developer"
          REQUIRED="$(DEVELOPER_DIR="$DEVELOPER_DIR" xcrun swift package tools-version)"
          INSTALLED="$(DEVELOPER_DIR="$DEVELOPER_DIR" xcrun swift -version 2>/dev/null \
            | sed -nE 's/.*Swift version ([0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/p' | head -n1)"
          # When even the newest Xcode's Swift predates the package's tools
          # version (runner images lag Swift releases by weeks), don't fail —
          # signal the next step to install the repo-pinned swift.org
          # toolchain instead. Xcode is still selected either way: the SDK,
          # actool, Metal, codesign, and notarytool all come from it.
          if [[ -z "$INSTALLED" ]] || [[ "$(printf '%s\n%s\n' "$REQUIRED" "$INSTALLED" | sort -V | head -n1)" != "$REQUIRED" ]]; then
            echo "Newest Xcode ($NEWEST) ships Swift ${INSTALLED:-unknown} < required $REQUIRED — will install the pinned swift.org toolchain."
            echo "needs_toolchain=true" >> "$GITHUB_OUTPUT"
          else
            echo "Selected $NEWEST (Swift $INSTALLED >= required $REQUIRED)"
            echo "needs_toolchain=false" >> "$GITHUB_OUTPUT"
          fi
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          VERSION_STRING="$(DEVELOPER_DIR="$DEVELOPER_DIR" xcodebuild -version)"
          XC_VERSION="$(awk '/^Xcode /{print $2}' <<<"$VERSION_STRING")"
          XC_BUILD="$(awk '/^Build version/{print $3}' <<<"$VERSION_STRING")"
          # Single sanitized token for the cache key — never raw multiline
          # `xcodebuild -version` output.
          XC_TOKEN="$(printf 'Xcode_%s-%s' "$XC_VERSION" "$XC_BUILD" | tr -c 'A-Za-z0-9_.-' '_')"
          echo "xcode_id=$XC_TOKEN" >> "$GITHUB_OUTPUT"
          echo "Selected $NEWEST ($XC_TOKEN)"

      - name: Ensure Metal toolchain is installed
        run: |
          set -euo pipefail
          # Required for Ghostty's shader compile on Xcode versions where
          # Metal ships separately from the main toolchain.
          if xcrun -sdk macosx metal -v >/dev/null 2>&1; then
            echo "Metal toolchain already available via the selected Xcode."
          else
            echo "Metal toolchain not directly available; installing..."
            xcodebuild -downloadComponent MetalToolchain
          fi

      - name: Restore cached swift.org toolchain pkg
        if: steps.xcode.outputs.needs_toolchain == 'true'
        id: swift-pkg-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/swift-toolchain.pkg
          key: swift-pkg-v1-${{ hashFiles('.swift-version') }}

      - name: Install pinned swift.org toolchain
        if: steps.xcode.outputs.needs_toolchain == 'true'
        run: |
          set -euo pipefail
          # The runner image's Xcodes lag Swift releases; the repo pins its
          # Swift in .swift-version (same version the maintainers build and
          # ship with locally). Install the matching swift.org toolchain and
          # activate it via TOOLCHAINS — SwiftPM compiles with it while the
          # selected Xcode still provides the SDK and app tooling.
          SWIFT_VERSION="$(tr -d '[:space:]' < .swift-version)"
          PKG="$RUNNER_TEMP/swift-toolchain.pkg"
          if [[ ! -f "$PKG" ]]; then
            URL="https://download.swift.org/swift-${SWIFT_VERSION}-release/xcode/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-osx.pkg"
            echo "Downloading $URL"
            curl -fsSL -o "$PKG" "$URL"
          fi
          # Checksum must come from repo content reviewed in a PR, same trust
          # model as .github/zig-checksums.txt.
          EXPECTED="$(awk -v v="$SWIFT_VERSION" '$1 == v && $2 == "osx" {print $3}' .github/swift-toolchain-checksums.txt)"
          if [[ -z "$EXPECTED" ]]; then
            echo "::error::no pinned checksum for swift.org toolchain $SWIFT_VERSION — add a reviewed row to .github/swift-toolchain-checksums.txt" >&2
            exit 1
          fi
          ACTUAL="$(shasum -a 256 "$PKG" | awk '{print $1}')"
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::swift.org toolchain pkg checksum mismatch (expected $EXPECTED, got $ACTUAL)" >&2
            exit 1
          fi
          sudo installer -pkg "$PKG" -target /
          TOOLCHAIN_PLIST="/Library/Developer/Toolchains/swift-${SWIFT_VERSION}-RELEASE.xctoolchain/Info.plist"
          if [[ ! -f "$TOOLCHAIN_PLIST" ]]; then
            echo "::error::toolchain installed but $TOOLCHAIN_PLIST not found — did the pkg layout change?" >&2
            ls /Library/Developer/Toolchains >&2 || true
            exit 1
          fi
          TOOLCHAIN_ID="$(plutil -extract CFBundleIdentifier raw "$TOOLCHAIN_PLIST")"
          echo "TOOLCHAINS=$TOOLCHAIN_ID" >> "$GITHUB_ENV"
          # Prove the activation actually took before spending build time.
          ACTIVE="$(TOOLCHAINS="$TOOLCHAIN_ID" xcrun swift -version 2>/dev/null \
            | sed -nE 's/.*Swift version ([0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/p' | head -n1)"
          if [[ "$ACTIVE" != "$SWIFT_VERSION" ]]; then
            echo "::error::TOOLCHAINS activation failed — swift reports ${ACTIVE:-nothing}, expected $SWIFT_VERSION" >&2
            exit 1
          fi
          echo "Active Swift toolchain: $ACTIVE ($TOOLCHAIN_ID)"

      - name: Save swift.org toolchain pkg to cache
        if: steps.xcode.outputs.needs_toolchain == 'true' && steps.swift-pkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/swift-toolchain.pkg
          key: ${{ steps.swift-pkg-cache.outputs.cache-primary-key }}

      - name: Restore cached Ghostty artifacts
        id: ghostty-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build/ghostty
          # v1 prefix is the manual poison-cache invalidation lever. Xcode
          # bumps deliberately change the key: Ghostty archives built under
          # one toolchain shouldn't silently serve another.
          key: ghostty-v1-${{ runner.arch }}-${{ steps.ghostty-pin.outputs.ghostty_sha }}-${{ env.AWESOMUX_GHOSTTY_OPTIMIZE }}-${{ steps.xcode.outputs.xcode_id }}

      - name: Build or validate Ghostty artifacts
        run: ./script/ensure_ghostty_artifacts.sh

      - name: Save Ghostty artifacts to cache
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build/ghostty
          key: ${{ steps.ghostty-cache.outputs.cache-primary-key }}

      - name: Pre-build before signing material exists
        run: |
          set -euo pipefail
          # SwiftPM resolves and compiles third-party packages here — that's
          # build-time code execution. Running the expensive
          # dependency-touching build BEFORE the keychain import below means
          # no foreign build code ever executes while an unlocked signing
          # keychain is on the search list. build_release.sh's own staging
          # pass re-runs incrementally in seconds afterward.
          ./script/build_and_run.sh --stage-release

      - name: Import signing identity into a temporary keychain
        id: keychain
        env:
          RELEASE_P12_BASE64: ${{ secrets.RELEASE_P12_BASE64 }}
          RELEASE_P12_PASSWORD: ${{ secrets.RELEASE_P12_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          P12_PATH="$RUNNER_TEMP/release-cert.p12"

          ORIGINAL_DEFAULT_KEYCHAIN="$(security default-keychain -d user | xargs)"
          ORIGINAL_SEARCH_LIST="$(security list-keychains -d user | sed -E 's/^[[:space:]]*"(.*)"[[:space:]]*$/\1/')"

          # Randomized per-run delimiter (matching GitHub's documented
          # recommendation for multiline env writes) rather than a fixed
          # string — a fixed delimiter could in principle collide with a
          # line inside $ORIGINAL_SEARCH_LIST and truncate the write.
          SEARCH_LIST_EOF_MARKER="EOF_$(/usr/bin/openssl rand -hex 8)"
          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "P12_PATH=$P12_PATH"
            echo "ORIGINAL_DEFAULT_KEYCHAIN=$ORIGINAL_DEFAULT_KEYCHAIN"
            echo "ORIGINAL_SEARCH_LIST<<$SEARCH_LIST_EOF_MARKER"
            echo "$ORIGINAL_SEARCH_LIST"
            echo "$SEARCH_LIST_EOF_MARKER"
          } >> "$GITHUB_ENV"
          # KEYCHAIN_PASSWORD deliberately stays a step-local shell var, not
          # $GITHUB_ENV: its only consumers (create-keychain, unlock,
          # set-keychain-settings below) are in this same step, and the
          # cleanup step's `security delete-keychain` doesn't need it either.
          # Least privilege — don't hand later steps a secret they don't use.

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SEARCH_LIST_ARGS=()
          while IFS= read -r kc; do
            [[ -n "$kc" ]] && SEARCH_LIST_ARGS+=("$kc")
          done <<<"$ORIGINAL_SEARCH_LIST"
          # macOS's system /bin/bash is 3.2, where "${empty_array[@]}" under
          # `set -u` throws "unbound variable" (fixed upstream in 4.4) — guard
          # the expansion rather than assume a newer bash is first on PATH.
          if [[ "${#SEARCH_LIST_ARGS[@]}" -gt 0 ]]; then
            security list-keychains -d user -s "$KEYCHAIN_PATH" "${SEARCH_LIST_ARGS[@]}"
          else
            security list-keychains -d user -s "$KEYCHAIN_PATH"
          fi
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # No auto-lock mid-build; a re-locked keychain is the classic
          # headless-signing hang.
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          printf '%s' "$RELEASE_P12_BASE64" | base64 -d > "$P12_PATH"
          chmod 600 "$P12_PATH"

          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$RELEASE_P12_PASSWORD" -T /usr/bin/codesign
          # Explicit path — never let this default. Omitting this step is the
          # classic headless-codesign hang (a UI password prompt that never
          # appears).
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY_COUNT="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -c 'Developer ID Application' || true)"
          if [[ "$IDENTITY_COUNT" -eq 0 ]]; then
            echo "::error::no Developer ID Application identity imported — check RELEASE_P12_BASE64/RELEASE_P12_PASSWORD in the 'release' environment" >&2
            exit 1
          elif [[ "$IDENTITY_COUNT" -gt 1 ]]; then
            echo "::error::the imported .p12 contains multiple identities — re-export it with only the Developer ID Application certificate" >&2
            exit 1
          fi

      - name: Configure notarytool credentials
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          NOTARY_KEY_PATH="$RUNNER_TEMP/notary-key.p8"
          printf '%s' "$NOTARY_KEY_P8" > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"
          echo "NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

          # store-credentials validates against Apple on save — that's the
          # credential smoke test. No separate `history` call: it would print
          # account submission metadata into public CI logs.
          xcrun notarytool store-credentials awesomux-notary \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --keychain "$KEYCHAIN_PATH"

      - name: Build, sign, and notarize the release artifact
        run: |
          set -euo pipefail
          ./script/build_release.sh \
            --version "$RELEASE_VERSION" \
            --identity "Developer ID Application: Interactive Buffoonery (7CNK4YPCQX)" \
            --notary-profile awesomux-notary \
            --output dist/release

      - name: Upload release DMG
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: awesoMux-release-dmg
          path: dist/release/awesoMux-*.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Upload release checksum
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: awesoMux-release-checksum
          path: dist/release/*.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload notarization debug artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: awesoMux-release-debug
          path: |
            dist/release/notarization-log-*.json
            dist/release/notarytool-submission-id-*.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Download Linux helper artifacts
        if: inputs.create_draft_release || startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-helper
          path: dist/release/

      - name: Verify Linux helper assets
        if: inputs.create_draft_release || startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          for f in \
            dist/release/awesomux-bridge-helper-linux-x86_64 \
            dist/release/awesomux-bridge-helper-linux-x86_64.sha256 \
            dist/release/awesomux-bridge-helper-linux-aarch64 \
            dist/release/awesomux-bridge-helper-linux-aarch64.sha256; do
            [[ -s "$f" ]] || { echo "::error::missing release asset: $f" >&2; exit 1; }
          done

      - name: Create draft GitHub Release
        if: inputs.create_draft_release || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$RELEASE_VERSION"
          # Draft releases do not create the tag ref until published (verified
          # empirically with v0.1.0); on tag events the ref already exists and
          # the draft attaches to it. Either way: a human reviews and clicks
          # publish.
          gh release create "v$VERSION" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --notes "Draft release created by release.yml — review, edit notes, and publish." \
            "dist/release/awesoMux-$VERSION.dmg" \
            "dist/release/awesoMux-$VERSION.dmg.sha256" \
            "dist/release/awesomux-bridge-helper-linux-x86_64" \
            "dist/release/awesomux-bridge-helper-linux-x86_64.sha256" \
            "dist/release/awesomux-bridge-helper-linux-aarch64" \
            "dist/release/awesomux-bridge-helper-linux-aarch64.sha256"

      - name: Publish rolling nightly prerelease
        if: github.event_name == 'schedule' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SRC_DMG="dist/release/awesoMux-$RELEASE_VERSION.dmg"
          [[ -s "$SRC_DMG" ]] || { echo "::error::expected $SRC_DMG from build_release.sh" >&2; exit 1; }
          # Stable rolling asset names so a download URL / Homebrew livecheck can
          # pin to `nightly` without chasing the dated version string.
          ROLL_DMG="dist/release/awesoMux-nightly.dmg"
          cp "$SRC_DMG" "$ROLL_DMG"
          (cd dist/release && shasum -a 256 awesoMux-nightly.dmg > awesoMux-nightly.dmg.sha256)

          # Replace-in-place. Delete the prior release together with its
          # lightweight tag (--cleanup-tag) so `create --target` can re-point the
          # tag at tonight's commit — nightly-gate reads that tag ref to decide
          # skip-if-unchanged. Deletion errors are NOT swallowed: a delete that
          # fails must fail the run, not silently leave a stale channel and let
          # the next gate skip it forever.
          if gh release view nightly >/dev/null 2>&1; then
            gh release delete nightly --yes --cleanup-tag
          fi
          # Orphaned tag (a lightweight `nightly` tag with no release, e.g. from a
          # half-finished prior swap) would make `create` collide, so drop it.
          # A 404 here is the normal "no tag" case — hence the existence guard
          # before the delete rather than masking the delete itself.
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/nightly" >/dev/null 2>&1; then
            gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/nightly" >/dev/null
          fi

          # Swap gap: between the delete above and the create below the channel is
          # briefly absent; if the API blips mid-swap, the next cron republishes.
          # Acceptable for a prerelease channel.
          gh release create nightly \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Nightly $RELEASE_VERSION" \
            --notes "Rolling nightly build from ${GITHUB_SHA} ($(date -u +%Y-%m-%dT%H:%M:%SZ)). Signed and notarized prerelease; unstable and unsupported." \
            "$ROLL_DMG" \
            "$ROLL_DMG.sha256"

      - name: Clean up signing keychain and temp credentials
        if: always()
        run: |
          set -euo pipefail
          # Restore before delete: a re-pointed default keychain and search
          # list must land before the temp keychain disappears, or later
          # processes point at a deleted keychain.
          if [[ -n "${ORIGINAL_DEFAULT_KEYCHAIN:-}" ]]; then
            SEARCH_LIST_ARGS=()
            while IFS= read -r kc; do
              [[ -n "$kc" ]] && SEARCH_LIST_ARGS+=("$kc")
            done <<<"${ORIGINAL_SEARCH_LIST:-}"
            # Always reset the search list, mirroring the import step's
            # unconditional call — even an empty original list must not be
            # left pointing at the soon-deleted temp keychain.
            if [[ "${#SEARCH_LIST_ARGS[@]}" -gt 0 ]]; then
              security list-keychains -d user -s "${SEARCH_LIST_ARGS[@]}"
            else
              security list-keychains -d user -s
            fi
            security default-keychain -d user -s "$ORIGINAL_DEFAULT_KEYCHAIN"
          fi

          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

          rm -f "${P12_PATH:-}" "${NOTARY_KEY_PATH:-}"
