name: Bug report
description: Report reproducible unexpected behavior in awesoMux.
title: "bug: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please search existing
        issues before opening a new report, and do not include sensitive data.
  - type: input
    id: version
    attributes:
      label: awesoMux version or commit
      description: Include the app version, release tag, or commit SHA.
      placeholder: "e.g. main at abc1234"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.5"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence of steps.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs or screenshots only after removing terminal content and other sensitive data.
    validations:
      required: true
