name: Feature request
description: Suggest an improvement to awesoMux.
title: "feature: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the problem before proposing
        a solution so we can evaluate alternatives.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user need or workflow is not well served today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and user experience you would expect.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches have you considered?
